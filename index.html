<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Bloom — Habit Tracker</title>
  <meta name="description" content="A calm, beautiful habit tracker. Build routines, keep streaks, and watch yourself grow." />
  <meta name="theme-color" content="#cfbff5" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1d1b26" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bloom" />
</head>
<body data-theme="lavender">
  <div class="aurora" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
  </div>


  <main id="app" class="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div class="brand-text">
          <h1 id="viewTitle">Today</h1>
          <p id="viewSubtitle" class="muted"></p>
        </div>
      </div>
      <div class="header-actions">
        <button id="dateBack" class="icon-btn" title="Previous day" aria-label="Previous day">‹</button>
        <button id="dateToday" class="chip" title="Jump to today">Today</button>
        <button id="dateFwd" class="icon-btn" title="Next day" aria-label="Next day">›</button>
      </div>
    </header>
    <section id="view-today" class="view active"></section>
    <section id="view-habits" class="view"></section>
    <section id="view-stats" class="view"></section>
    <section id="view-settings" class="view"></section>
  </main>


  <button id="fab" class="fab" aria-label="Add habit" title="Add habit">
    <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
  </button>


  <nav class="tabbar" role="tablist">
    <button class="tab active" data-view="today" role="tab" aria-selected="true">
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 11.5 12 4l9 7.5M5 10v9h5v-5h4v5h5v-9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Today</span>
    </button>
    <button class="tab" data-view="habits" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Habits</span>
    </button>
    <button class="tab" data-view="stats" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M5 19V9m7 10V5m7 14v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Stats</span>
    </button>
    <button class="tab" data-view="settings" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3M5 5l2 2m10 10 2 2M19 5l-2 2M7 17l-2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <span>Settings</span>
    </button>
  </nav>


  <div id="modalRoot" class="modal-root" aria-hidden="true"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>


<style>
:root {
  --accent: #b9a4ef; --accent-2: #a8e6cf; --accent-3: #ffd5ba; --accent-soft: #efe9fc;
  --bg: #f6f3fb; --bg-2: #efeaf7;
  --surface: rgba(255, 255, 255, 0.72); --surface-solid: #ffffff; --surface-2: rgba(255, 255, 255, 0.5);
  --text: #2c2840; --text-soft: #6b6680; --muted: #9d98ad;
  --line: rgba(80, 70, 120, 0.10);
  --shadow: 0 12px 40px rgba(94, 78, 160, 0.14); --shadow-sm: 0 4px 16px rgba(94, 78, 160, 0.10);
  --ring: rgba(185, 164, 239, 0.45);
  --radius: 22px; --radius-sm: 14px; --radius-lg: 30px; --tab-h: 72px; --maxw: 720px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", Roboto, system-ui, sans-serif;
  --ease: cubic-bezier(.22,.61,.36,1);
}
[data-theme="lavender"] { --accent:#b9a4ef; --accent-2:#a8e6cf; --accent-3:#ffd5ba; --accent-soft:#efe9fc; --ring:rgba(185,164,239,.5); }
[data-theme="rose"]     { --accent:#f3a9c4; --accent-2:#ffd5ba; --accent-3:#cdb4f0; --accent-soft:#fdeaf1; --ring:rgba(243,169,196,.5); }
[data-theme="mint"]     { --accent:#84d8b6; --accent-2:#bfe88f; --accent-3:#a4dbe8; --accent-soft:#e4f6ee; --ring:rgba(132,216,182,.5); }
[data-theme="sky"]      { --accent:#9ec5f0; --accent-2:#bcd6f7; --accent-3:#c9b8f0; --accent-soft:#e7f0fc; --ring:rgba(158,197,240,.5); }
[data-theme="peach"]    { --accent:#f6b8a0; --accent-2:#ffd9a8; --accent-3:#f3a9c4; --accent-soft:#fdeee6; --ring:rgba(246,184,160,.5); }
@media (prefers-color-scheme: dark) {
  :root:not([data-force="light"]) {
    --bg:#16141f; --bg-2:#1d1b28;
    --surface:rgba(40,37,54,0.66); --surface-solid:#232032; --surface-2:rgba(255,255,255,0.04);
    --text:#ece9f6; --text-soft:#b6b1c9; --muted:#817c97; --line:rgba(255,255,255,0.08);
    --shadow:0 16px 44px rgba(0,0,0,0.45); --shadow-sm:0 6px 18px rgba(0,0,0,0.35);
  }
}
[data-force="dark"] {
  --bg:#16141f; --bg-2:#1d1b28;
  --surface:rgba(40,37,54,0.66); --surface-solid:#232032; --surface-2:rgba(255,255,255,0.04);
  --text:#ece9f6; --text-soft:#b6b1c9; --muted:#817c97; --line:rgba(255,255,255,0.08);
  --shadow:0 16px 44px rgba(0,0,0,0.45); --shadow-sm:0 6px 18px rgba(0,0,0,0.35);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  margin: 0; font-family: var(--font); color: var(--text); background: var(--bg);
  background-image:
    radial-gradient(1200px 600px at 10% -10%, var(--accent-soft), transparent 60%),
    radial-gradient(900px 500px at 110% 10%, color-mix(in srgb, var(--accent-2) 38%, transparent), transparent 55%);
  background-attachment: fixed; overflow-x: hidden; -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility; letter-spacing: .1px;
}
.aurora { position: fixed; inset: 0; z-index: -1; overflow: hidden; filter: blur(60px); opacity: .55; }
.blob { position: absolute; width: 46vmax; height: 46vmax; border-radius: 50%; mix-blend-mode: multiply; }
@media (prefers-color-scheme: dark){ .blob{ mix-blend-mode: screen; opacity:.5;} .aurora{opacity:.4;} }
.b1 { background: var(--accent);   top: -14%; left: -10%; animation: drift1 22s var(--ease) infinite alternate; }
.b2 { background: var(--accent-2); bottom: -18%; right: -12%; animation: drift2 26s var(--ease) infinite alternate; }
.b3 { background: var(--accent-3); top: 35%; left: 45%; width: 32vmax; height: 32vmax; animation: drift3 30s var(--ease) infinite alternate; }
@keyframes drift1 { to { transform: translate(8vw, 6vh) scale(1.15); } }
@keyframes drift2 { to { transform: translate(-7vw, -5vh) scale(1.1); } }
@keyframes drift3 { to { transform: translate(-6vw, 8vh) scale(.9); } }
@media (prefers-reduced-motion: reduce){ .blob{ animation: none; } }
.app { max-width: var(--maxw); margin: 0 auto; padding: calc(env(safe-area-inset-top) + 14px) 16px calc(var(--tab-h) + env(safe-area-inset-bottom) + 28px); min-height: 100%; }
.app-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
.brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
.brand-mark {
  width: 42px; height: 42px; border-radius: 14px; flex: none;
  background: radial-gradient(circle at 50% 38%, var(--accent-3) 0 16%, transparent 17%), conic-gradient(from -90deg, var(--accent), var(--accent-2), var(--accent-3), var(--accent));
  box-shadow: var(--shadow-sm), inset 0 0 0 1.5px rgba(255,255,255,.5); position: relative;
}
.brand-mark::before {
  content:""; position:absolute; inset:0; border-radius:14px;
  background: radial-gradient(circle at 50% 30%, #fff 0 13%, transparent 14%), radial-gradient(circle at 70% 52%, #fff 0 13%, transparent 14%), radial-gradient(circle at 60% 74%, #fff 0 13%, transparent 14%), radial-gradient(circle at 40% 74%, #fff 0 13%, transparent 14%), radial-gradient(circle at 30% 52%, #fff 0 13%, transparent 14%);
  opacity:.92;
}
.brand-text { min-width: 0; }
.brand-text h1 { margin: 0; font-size: 1.55rem; font-weight: 800; letter-spacing: -.3px; }
.brand-text .muted { margin: 1px 0 0; font-size: .8rem; }
.muted { color: var(--muted); }
.header-actions { display: flex; align-items: center; gap: 6px; }
.icon-btn { width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--line); background: var(--surface); color: var(--text-soft); font-size: 1.4rem; line-height: 1; display: grid; place-items: center; cursor: pointer; backdrop-filter: blur(12px); transition: transform .15s var(--ease), background .2s; }
.icon-btn:active { transform: scale(.92); }
.chip { border: 1px solid var(--line); background: var(--surface); color: var(--text-soft); padding: 8px 14px; border-radius: 12px; font-weight: 700; font-size: .82rem; cursor: pointer; backdrop-filter: blur(12px); }
.view { display: none; animation: fade .35s var(--ease); }
.view.active { display: block; }
@keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.section-title { font-size: .82rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 22px 4px 10px; }
.card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-sm); backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%); }
.hero { padding: 22px; display: flex; align-items: center; gap: 20px; margin-bottom: 6px; overflow:hidden; position:relative; }
.hero .ring-wrap { position: relative; flex: none; width: 120px; height: 120px; }
.hero .ring-label { position: absolute; inset: 0; display: grid; place-content: center; text-align: center; }
.hero .ring-label .pct { font-size: 1.7rem; font-weight: 800; letter-spacing: -1px; }
.hero .ring-label .sub { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.hero-info h2 { margin: 0 0 4px; font-size: 1.15rem; font-weight: 800; }
.hero-info p { margin: 0; color: var(--text-soft); font-size: .9rem; line-height: 1.45; }
.hero-stats { display: flex; gap: 18px; margin-top: 12px; }
.hero-stats .s { display: flex; flex-direction: column; }
.hero-stats .s b { font-size: 1.15rem; font-weight: 800; }
.hero-stats .s span { font-size: .72rem; color: var(--muted); }
.habit-list { display: flex; flex-direction: column; gap: 12px; }
.habit { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: var(--radius); cursor: pointer; position: relative; background: var(--surface); border: 1px solid var(--line); box-shadow: var(--shadow-sm); backdrop-filter: blur(18px) saturate(140%); transition: transform .18s var(--ease), box-shadow .2s, opacity .25s; overflow: hidden; }
.habit::before { content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background: var(--h-color, var(--accent)); opacity:.9; }
.habit:active { transform: scale(.985); }
.habit.done { opacity: .68; }
.habit.done .habit-name { text-decoration: line-through; text-decoration-color: var(--muted); }
.habit-emoji { width: 46px; height: 46px; border-radius: 14px; flex: none; display: grid; place-items: center; font-size: 1.45rem; background: color-mix(in srgb, var(--h-color, var(--accent)) 20%, var(--surface-solid)); box-shadow: inset 0 0 0 1px var(--line); }
.habit-main { flex: 1; min-width: 0; }
.habit-name { font-weight: 700; font-size: 1.02rem; display: flex; align-items: center; gap: 8px; }
.habit-meta { font-size: .78rem; color: var(--muted); margin-top: 2px; display:flex; gap:10px; flex-wrap:wrap; }
.streak-badge { display:inline-flex; align-items:center; gap:3px; font-weight:700; color: var(--accent-3-ink, #d9883f); }
@media (prefers-color-scheme: dark){ .streak-badge{ color:#f3b27a; } }
.check { width: 40px; height: 40px; border-radius: 50%; flex: none; cursor: pointer; border: 2.5px solid color-mix(in srgb, var(--h-color, var(--accent)) 55%, var(--line)); background: transparent; display: grid; place-items: center; color: #fff; transition: transform .18s var(--ease), background .25s, border-color .25s; }
.check svg { opacity: 0; transform: scale(.4); transition: .2s var(--ease); }
.check.on { background: var(--h-color, var(--accent)); border-color: var(--h-color, var(--accent)); box-shadow: 0 6px 16px color-mix(in srgb, var(--h-color, var(--accent)) 45%, transparent); }
.check.on svg { opacity: 1; transform: scale(1); }
.check:active { transform: scale(.85); }
.counter { display: flex; align-items: center; gap: 8px; flex: none; }
.counter button { width: 32px; height: 32px; border-radius: 10px; border: 1px solid var(--line); background: var(--surface-solid); color: var(--text); font-size: 1.2rem; cursor: pointer; line-height: 1; }
.counter .cval { min-width: 54px; text-align: center; font-weight: 800; font-size: .92rem; }
.counter .cval small { color: var(--muted); font-weight: 600; }
.confetti { position: fixed; z-index: 60; pointer-events: none; width: 10px; height: 14px; border-radius: 2px; will-change: transform, opacity; }
.fab { position: fixed; right: calc(50% - var(--maxw)/2 + 18px); bottom: calc(var(--tab-h) + env(safe-area-inset-bottom) + 18px); width: 60px; height: 60px; border-radius: 20px; border: none; cursor: pointer; z-index: 40; color: #fff; display: grid; place-items: center; background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent-2) 80%, var(--accent))); box-shadow: 0 14px 30px color-mix(in srgb, var(--accent) 50%, transparent), inset 0 0 0 1px rgba(255,255,255,.3); transition: transform .2s var(--ease); }
.fab:active { transform: scale(.9) rotate(90deg); }
@media (max-width: 760px){ .fab{ right: 18px; } }
.tabbar { position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(env(safe-area-inset-bottom) + 10px); width: min(var(--maxw), calc(100% - 24px)); height: var(--tab-h); display: flex; z-index: 50; background: var(--surface); border: 1px solid var(--line); border-radius: 26px; box-shadow: var(--shadow); backdrop-filter: blur(26px) saturate(150%); -webkit-backdrop-filter: blur(26px) saturate(150%); padding: 6px; }
.tab { flex: 1; border: none; background: none; cursor: pointer; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: .68rem; font-weight: 700; border-radius: 20px; transition: color .2s, background .2s; }
.tab svg { transition: transform .2s var(--ease); }
.tab.active { color: var(--accent); background: var(--accent-soft); }
.tab.active svg { transform: translateY(-1px) scale(1.06); }
@media (prefers-color-scheme: dark){ .tab.active{ background: color-mix(in srgb, var(--accent) 22%, transparent); } }
.btn { appearance: none; border: none; cursor: pointer; font-family: inherit; font-weight: 700; padding: 13px 18px; border-radius: 16px; font-size: .95rem; background: var(--surface-solid); color: var(--text); border: 1px solid var(--line); transition: transform .15s var(--ease), box-shadow .2s; }
.btn:active { transform: scale(.97); }
.btn.primary { color: #fff; border: none; background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent-2) 70%, var(--accent))); box-shadow: 0 10px 24px color-mix(in srgb, var(--accent) 40%, transparent); }
.btn.ghost { background: transparent; }
.btn.danger { color: #c0392b; border-color: color-mix(in srgb, #c0392b 30%, var(--line)); }
.btn.block { width: 100%; }
.btn.sm { padding: 9px 14px; font-size: .85rem; border-radius: 12px; }
label.field { display: block; margin: 14px 0; }
label.field > span { display: block; font-size: .8rem; font-weight: 700; color: var(--text-soft); margin-bottom: 7px; }
input[type=text], input[type=number], input[type=time], textarea, select { width: 100%; font-family: inherit; font-size: 1rem; color: var(--text); padding: 13px 14px; border-radius: 14px; border: 1px solid var(--line); background: var(--surface-solid); outline: none; transition: border-color .2s, box-shadow .2s; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--ring); }
textarea { resize: vertical; min-height: 80px; }
.pills { display: flex; flex-wrap: wrap; gap: 8px; }
.pill { border: 1px solid var(--line); background: var(--surface-solid); color: var(--text-soft); padding: 9px 14px; border-radius: 999px; font-size: .85rem; font-weight: 700; cursor: pointer; transition: all .18s var(--ease); }
.pill.on { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 6px 14px color-mix(in srgb, var(--accent) 40%, transparent); }
.swatches { display: flex; flex-wrap: wrap; gap: 10px; }
.swatch { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; box-shadow: inset 0 0 0 1px var(--line); transition: transform .15s var(--ease); }
.swatch.on { border-color: var(--text); transform: scale(1.12); }
.emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; max-height: 168px; overflow-y: auto; padding: 4px; }
.emoji-opt { font-size: 1.35rem; padding: 6px; border-radius: 10px; cursor: pointer; text-align: center; border: 1px solid transparent; }
.emoji-opt.on { background: var(--accent-soft); border-color: var(--accent); }
.modal-root { position: fixed; inset: 0; z-index: 80; display: none; }
.modal-root.open { display: block; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(20,16,40,.34); backdrop-filter: blur(3px); animation: fade .25s var(--ease); }
.modal { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); width: min(560px, 100%); max-height: 92vh; overflow-y: auto; background: var(--bg-2); border-radius: 28px 28px 0 0; padding: 10px 18px calc(env(safe-area-inset-bottom) + 22px); box-shadow: 0 -20px 60px rgba(40,20,80,.3); animation: sheetUp .4s var(--ease); border: 1px solid var(--line); border-bottom: none; }
@media (min-width: 600px){ .modal { bottom: auto; top: 50%; transform: translate(-50%, -50%); border-radius: 28px; border-bottom: 1px solid var(--line); max-height: 88vh; } }
@keyframes sheetUp { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }
.modal .grabber { width: 42px; height: 5px; border-radius: 99px; background: var(--line); margin: 6px auto 12px; }
.modal h2 { margin: 4px 4px 8px; font-size: 1.3rem; font-weight: 800; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions .btn { flex: 1; }
.detail-head { display:flex; align-items:center; gap:14px; margin: 4px 4px 14px; }
.detail-head .habit-emoji { width: 56px; height: 56px; font-size: 1.8rem; }
.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.stat-card { padding: 16px; }
.stat-card .v { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
.stat-card .k { font-size: .78rem; color: var(--muted); margin-top: 2px; }
.stat-card .v small { font-size: .9rem; color: var(--muted); font-weight: 700; }
.heatmap { padding: 16px; overflow-x: auto; }
.heatmap svg { display: block; }
.legend { display: flex; align-items: center; gap: 6px; font-size: .72rem; color: var(--muted); margin-top: 10px; justify-content: flex-end; }
.legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
.chart-card { padding: 18px 16px 10px; }
.chart-card h3, .heatmap h3 { margin: 0 0 12px; font-size: .95rem; font-weight: 800; }
.empty { text-align: center; padding: 48px 20px; color: var(--text-soft); }
.empty .big { font-size: 3rem; margin-bottom: 10px; }
.empty h3 { margin: 0 0 6px; color: var(--text); }
.empty p { margin: 0 0 18px; }
.mood-row { display:flex; justify-content: space-between; gap: 6px; }
.mood { flex:1; aspect-ratio: 1; border-radius: 16px; border: 1px solid var(--line); background: var(--surface-solid); font-size: 1.6rem; cursor: pointer; display:grid; place-items:center; transition: transform .15s var(--ease), background .2s; }
.mood.on { background: var(--accent-soft); border-color: var(--accent); transform: translateY(-2px) scale(1.04); }
.list { overflow: hidden; }
.list .row { display:flex; align-items:center; justify-content: space-between; gap: 12px; padding: 15px 16px; border-bottom: 1px solid var(--line); }
.list .row:last-child { border-bottom: none; }
.list .row .l { display:flex; flex-direction:column; gap: 2px; }
.list .row .l b { font-weight: 700; font-size: .98rem; }
.list .row .l span { font-size: .8rem; color: var(--muted); }
.switch { width: 50px; height: 30px; border-radius: 99px; background: var(--line); position: relative; cursor: pointer; flex: none; transition: background .25s; border:none; }
.switch::after { content:""; position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; box-shadow: 0 2px 6px rgba(0,0,0,.2); transition: transform .25s var(--ease); }
.switch.on { background: var(--accent); }
.switch.on::after { transform: translateX(20px); }

    row.appendChild(h('div', { class: 'habit-main', onclick: () => openHabitDetail(hb.id) }, [h('div', { class: 'habit-name', text: hb.name }), h('div', { class: 'habit-meta' }, [h('span', { text: scheduleLabel(hb) }), h('span', { class: 'tag', text: hb.category }), h('span', { class: 'streak-badge', html: `🔥 ${currentStreak(hb)}` })])]));
    const acts = h('div', { class: 'counter' });
    if (i > 0) acts.appendChild(h('button', { html: '↑', title: 'Move up', onclick: () => store.reorderHabit(hb.id, -1) }));
    if (i < active.length - 1) acts.appendChild(h('button', { html: '↓', title: 'Move down', onclick: () => store.reorderHabit(hb.id, 1) }));
    row.appendChild(acts);
    list.appendChild(row);
  });
  root.appendChild(list);
  if (archived.length) {
    root.appendChild(h('div', { class: 'section-title', text: 'Archived' }));
    const al = h('div', { class: 'habit-list' });
    archived.forEach((hb) => {
      const row = h('div', { class: 'habit', style: { '--h-color': hb.color, opacity: .7 } });
      row.appendChild(h('div', { class: 'habit-emoji', text: hb.emoji }));
      row.appendChild(h('div', { class: 'habit-main' }, [h('div', { class: 'habit-name', text: hb.name }), h('div', { class: 'habit-meta' }, [h('span', { text: 'Archived' })])]));
      row.appendChild(h('button', { class: 'btn sm', text: 'Restore', onclick: () => { store.archiveHabit(hb.id, false); toast('Restored'); } }));
      al.appendChild(row);
    });
    root.appendChild(al);
  }
}
function openHabitDetail(id) {
  const hb = store.habit(id); if (!hb) return;
  openModal((modal, close) => {
    modal.appendChild(h('div', { class: 'detail-head' }, [h('div', { class: 'habit-emoji', style: { '--h-color': hb.color }, text: hb.emoji }), h('div', {}, [h('h2', { text: hb.name, style: { margin: 0 } }), h('div', { class: 'muted', text: `${scheduleLabel(hb)} · ${hb.category}` })])]));
    if (hb.note) modal.appendChild(h('p', { class: 'muted', text: hb.note, style: { margin: '0 4px 8px' } }));
    const grid = h('div', { class: 'stat-grid' }, [statCard(currentStreak(hb), 'Current streak 🔥'), statCard(longestStreak(hb), 'Longest streak'), statCard(Math.round(completionRate(hb, 30) * 100) + '%', 'Last 30 days'), statCard(totalCompletions(hb), 'Total done')]);
    modal.appendChild(grid);
    const hmCard = h('div', { class: 'card heatmap mt' });
    hmCard.appendChild(h('h3', { text: 'Last 17 weeks' }));
    hmCard.appendChild(heatmap(17, (d) => ({ value: isDue(hb, d) ? progress(hb, d) : 0, due: isDue(hb, d) }), hb.color));
    modal.appendChild(hmCard);
    const notes = store.habitNotes(hb.id);
    const noteCard = h('div', { class: 'card mt', style: { padding: '16px' } });
    noteCard.appendChild(h('h3', { text: 'Journal', style: { margin: '0 0 10px' } }));
    const ta = h('textarea', { placeholder: `Add a note for ${prettyDate(app.date)}…`, value: store.getLog(hb.id, app.date)?.note || '' });
    noteCard.appendChild(ta);
    noteCard.appendChild(h('button', { class: 'btn sm primary mt', text: 'Save note', onclick: () => { store.setNote(hb.id, app.date, ta.value.trim()); toast('Note saved'); } }));
    if (notes.length) {
      noteCard.appendChild(h('div', { class: 'divider' }));
      notes.slice(0, 8).forEach((n) => noteCard.appendChild(h('div', { class: 'note-item' }, [h('div', { class: 'd', text: prettyDate(n.date) }), h('div', { text: n.note })])));
    }
    modal.appendChild(noteCard);
    modal.appendChild(h('div', { class: 'modal-actions' }, [h('button', { class: 'btn ghost', text: 'Archive', onclick: async () => { store.archiveHabit(hb.id, true); close(); toast('Archived'); } }), h('button', { class: 'btn', text: 'Edit', onclick: () => { close(); openHabitEditor(hb, () => render()); } })]));
    modal.appendChild(h('button', { class: 'btn danger block mt', text: 'Delete habit', onclick: async () => { const ok = await confirmDialog('Delete habit?', `"${hb.name}" and all its history will be permanently removed.`, 'Delete'); if (ok) { store.deleteHabit(hb.id); closeModal(); toast('Deleted'); } }}));
  });
}
function statCard(v, k) { return h('div', { class: 'card stat-card' }, [h('div', { class: 'v', text: String(v) }), h('div', { class: 'k', text: k })]); }
function renderStats() {
  const root = clear(document.getElementById('view-stats'));
  const active = store.activeHabits();
  if (!active.length) { root.appendChild(emptyState('▪', 'No data yet', 'Create habits and check them off to see your insights bloom.', () => setView('habits'))); return; }
  const today = todayISO();
  let totalDone = 0; active.forEach((hb) => totalDone += totalCompletions(hb));
  const overallBest = active.reduce((m, hb) => Math.max(m, longestStreak(hb)), 0);
  const overallCur = active.reduce((m, hb) => Math.max(m, currentStreak(hb)), 0);
  const avgRate = Math.round(active.reduce((s, hb) => s + completionRate(hb, 30), 0) / active.length * 100);
  root.appendChild(h('div', { class: 'stat-grid' }, [statCard(totalDone, 'Total completions'), statCard(avgRate + '%', 'Avg 30-day rate'), statCard(overallCur, 'Current best 🔥'), statCard(overallBest, 'Longest ever')]));
  const hmCard = h('div', { class: 'card heatmap mt' });
  hmCard.appendChild(h('h3', { text: 'Consistency — all habits' }));
  hmCard.appendChild(heatmap(20, (d) => { const s = dayScore(d); return { value: s.pct, due: s.total > 0 }; }));
  hmCard.appendChild(h('div', { class: 'legend' }, [h('span', { text: 'Less' }), h('i', { style: { background: 'var(--surface-2)' } }), h('i', { style: { background: 'color-mix(in srgb, var(--accent) 40%, var(--surface-solid))' } }), h('i', { style: { background: 'color-mix(in srgb, var(--accent) 70%, var(--surface-solid))' } }), h('i', { style: { background: 'var(--accent)' } }), h('span', { text: 'More' })]));
  root.appendChild(hmCard);
  const barCard = h('div', { class: 'card chart-card mt' });
  barCard.appendChild(h('h3', { text: 'This week' }));
  const data = [];
  for (let i = 6; i >= 0; i--) { const d = addDays(today, -i); const s = dayScore(d); const lbl = fromISO(d).toLocaleDateString(undefined, { weekday: 'short' })[0]; data.push({ label: lbl, value: s.pct, title: `${d}: ${s.done}/${s.total}` }); }
  barCard.appendChild(bars(data));
  root.appendChild(barCard);
  const trendCard = h('div', { class: 'card chart-card mt' });
  trendCard.appendChild(h('h3', { text: '30-day momentum' }));
  const pts = []; for (let i = 29; i >= 0; i--) pts.push(dayScore(addDays(today, -i)).pct);
  trendCard.appendChild(trend(pts));
  root.appendChild(trendCard);
  root.appendChild(h('div', { class: 'section-title', text: 'By habit (30 days)' }));
  const list = h('div', { class: 'habit-list' });
  active.forEach((hb) => {
    const rate = Math.round(completionRate(hb, 30) * 100);
    const row = h('div', { class: 'card', style: { padding: '14px 16px', display: 'flex', alignItems: 'center', gap: '12px' } });
    row.appendChild(h('div', { class: 'habit-emoji', style: { '--h-color': hb.color, width: '38px', height: '38px', fontSize: '1.2rem' }, text: hb.emoji }));
    const bar = h('div', { style: { flex: 1 } }, [h('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '.85rem', fontWeight: 700, marginBottom: '5px' } }, [h('span', { text: hb.name }), h('span', { class: 'muted', text: rate + '%' })]), h('div', { style: { height: '8px', borderRadius: '99px', background: 'var(--line)', overflow: 'hidden' } }, [h('div', { style: { width: rate + '%', height: '100%', borderRadius: '99px', background: hb.color, transition: 'width .6s' } })])]);
    row.appendChild(bar);
    list.appendChild(row);
  });
  root.appendChild(list);
}
function renderSettings() {
  const root = clear(document.getElementById('view-settings'));
  const s = store.settings;
  root.appendChild(h('div', { class: 'section-title', text: 'Appearance' }));
  const themeCard = h('div', { class: 'card', style: { padding: '16px' } });
  themeCard.appendChild(h('div', { style: { fontWeight: 700, marginBottom: '10px' }, text: 'Accent theme' }));
  const themeRow = h('div', { class: 'swatches', style: { marginBottom: '16px' } });
  [['lavender','#b9a4ef'],['rose','#f3a9c4'],['mint','#84d8b6'],['sky','#9ec5f0'],['peach','#f6b8a0']].forEach(([name, col]) => { themeRow.appendChild(h('button', { class: 'swatch' + (s.theme = name ? ' on' : ''), style: { background: col }, title: name, onclick: () => { s.theme = name; store.save(); } })); });
  themeCard.appendChild(themeRow);
  themeCard.appendChild(h('div', { style: { fontWeight: 700, marginBottom: '10px' }, text: 'Mode' }));
  const modeRow = h('div', { class: 'pills' });
  ['system', 'light', 'dark'].forEach((m) => { modeRow.appendChild(h('button', { class: 'pill' + (s.appearance = m ? ' on' : ''), text: m[0].toUpperCase() + m.slice(1), onclick: () => { s.appearance = m; store.save(); } })); });
  themeCard.appendChild(modeRow);
  root.appendChild(themeCard);
  root.appendChild(h('div', { class: 'section-title', text: 'Preferences' }));
  const prefs = h('div', { class: 'card list' });
  prefs.appendChild(toggleRow('Week starts on Monday', 'Used for weekly goals & charts', s.weekStart = 1, (on) => { s.weekStart = on ? 1 : 0; store.save(); }));
  prefs.appendChild(toggleRow('Celebration confetti', 'A little joy when you complete a habit', s.confetti, (on) => { s.confetti = on; store.save(); }));
  prefs.appendChild(toggleRow('Haptic feedback', 'Subtle vibration on supported devices', s.haptics, (on) => { s.haptics = on; store.save(); }));
  root.appendChild(prefs);
  root.appendChild(h('div', { class: 'section-title', text: 'Reminders' }));
  const remCard = h('div', { class: 'card list' });
  const perm = notif.permission();
  const permText = { granted: 'Enabled', denied: 'Blocked in browser settings', default: 'Not enabled yet', unsupported: 'Not supported here' }[perm];
  const remRow = h('div', { class: 'row' }, [h('div', { class: 'l' }, [h('b', { text: 'Notifications' }), h('span', { text: permText })]), perm = 'granted' ? h('span', { class: 'tag', text: 'On' }) : h('button', { class: 'btn sm primary', text: 'Enable', onclick: async () => { const r = await notif.requestPermission(); notif.reschedule(); toast(r = 'granted' ? 'Reminders enabled 🔔' : 'Permission ' + r); render(); } })]);
  remCard.appendChild(remRow);
  remCard.appendChild(h('div', { class: 'row' }, [h('div', { class: 'l' }, [h('span', { class: 'muted', text: 'Add reminder times per habit when editing. On iPhone, reminders are most reliable after you add Bloom to your Home Screen.' })])]));
  root.appendChild(remCard);
  root.appendChild(h('div', { class: 'section-title', text: 'Data & iCloud backup' }));
  const dataCard = h('div', { class: 'card list' });
  const last = s.lastBackup ? new Date(s.lastBackup).toLocaleString() : 'never';
  dataCard.appendChild(actionRow('Back up to iCloud Drive', 'Saves a .json file via the share sheet', 'Export', async () => { const r = await backup.exportBackup(); if (r = 'shared' || r = 'downloaded') toast('Backup ready — save it to iCloud Drive'); render(); }));
  dataCard.appendChild(actionRow('Restore from backup', `Last backup: ${last}`, 'Import', async () => { try { const obj = await backup.pickAndReadBackup(); const ok = await confirmDialog('Restore data?', 'This merges the backup into your current data.', 'Restore', false); if (ok) { store.mergeImport(obj); toast('Restored from backup ✓'); render(); } } catch (e) { toast(e.message); } }));
  dataCard.appendChild(actionRow('Export as CSV', 'Spreadsheet of every completion & mood', 'CSV', async () => { await backup.exportCSV(); toast('CSV exported'); }));
  dataCard.appendChild(actionRow('Erase all data', 'Permanently deletes everything on this device', 'Erase', async () => { const ok = await confirmDialog('Erase everything?', 'All habits, history and moods on this device will be deleted. Make a backup first!', 'Erase'); if (ok) { store.replaceAll({}); toast('All data erased'); setView('today'); } }, true));
  root.appendChild(dataCard);
  root.appendChild(h('div', { class: 'center muted mt', style: { fontSize: '.78rem', padding: '14px' }, html: 'Bloom · your data stays private on this device 🌿<br>Sync across devices by backing up to iCloud Drive and restoring on the other device.' }));
}
function toggleRow(title, sub, on, onChange) {
  const sw = h('button', { class: 'switch' + (on ? ' on' : ''), 'aria-label': title });
  sw.onclick = () => { const nv = !sw.classList.contains('on'); sw.classList.toggle('on', nv); onChange(nv); };
  return h('div', { class: 'row' }, [h('div', { class: 'l' }, [h('b', { text: title }), h('span', { text: sub })]), sw]);
}
function actionRow(title, sub, btnLabel, fn, danger) {
  return h('div', { class: 'row' }, [h('div', { class: 'l' }, [h('b', { text: title }), h('span', { text: sub })]), h('button', { class: 'btn sm ' + (danger ? 'danger' : ''), text: btnLabel, onclick: fn })]);
}
function emptyState(emoji, title, body, onAdd) {
  const wrap = h('div', { class: 'empty' }, [h('div', { class: 'big', text: emoji }), h('h3', { text: title }), h('p', { text: body })]);
  if (onAdd) wrap.appendChild(h('button', { class: 'btn primary', text: '+ Add habit', onclick: onAdd }));
  return wrap;
}
function maybeSeed() {
  if (store.habits.length) return;
  const samples = [
    { name: 'Drink water', emoji: '💧', color: '#9ec5f0', category: 'Health', type: 'count', target: 8, unit: 'glasses', schedule: { type: 'daily', weekdays:[0,1,2,3,4,5,6] } },
    { name: 'Meditate', emoji: '🧘', color: '#b9a4ef', category: 'Mindfulness', schedule: { type: 'daily', weekdays:[0,1,2,3,4,5,6] }, reminders: ['08:00'] },
    { name: 'Read', emoji: '▪', color: '#84d8b6', category: 'Learning', type: 'count', target: 10, unit: 'pages', schedule: { type: 'daily', weekdays:[0,1,2,3,4,5,6] } },
    { name: 'Workout', emoji: '🏃', color: '#f6b8a0', category: 'Fitness', schedule: { type: 'weekly', timesPerWeek: 4 } }
  ];
  samples.forEach((s) => store.addHabit(s));
  const wId = store.habits[0].id;
  for (let i = 1; i < 18; i++) { if (Math.random() > 0.25) store.setCount(wId, addDays(todayISO(), -i), 8); }
}
function boot() {
  store.load(); maybeSeed(); applyAppearance();
  document.querySelectorAll('.tab').forEach((t) => t.addEventListener('click', () => { buzz(6); setView(t.dataset.view); }));
  document.getElementById('fab').addEventListener('click', () => openHabitEditor(null, () => render()));
  document.getElementById('dateBack').addEventListener('click', () => { app.date = addDays(app.date, -1); render(); });
  document.getElementById('dateFwd').addEventListener('click', () => { if (app.date < todayISO()) { app.date = addDays(app.date, 1); render(); } });
  document.getElementById('dateToday').addEventListener('click', () => { app.date = todayISO(); render(); });
  store.subscribe(() => render());
  setView('today');
  notif.init();
}
boot();
</script>
